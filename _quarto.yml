project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "research/**/*.qmd"
    - "publications/**/*.qmd"
    - "cv/**/*.qmd"
    - "!README.md"
    - "!DEPLOY.md"
    - "!quarto-*/**"
    - "!_tmp/**"
    - "!_cache/**"

lang: en-US

website:
  title: "Emmanuel Hackman"
  description: "PhD researcher in computational mathematics — physics-informed neural networks for 3D Navier–Stokes."
  site-url: "https://personal-website-hachero98.vercel.app"
  repo-url: "https://github.com/Hachero98/personal-website"
  favicon: assets/img/profile.jpg

  open-graph:
    locale: en_US
    image: assets/img/profile.jpg
  twitter-card:
    creator: "@"
    image: assets/img/profile.jpg
    card-style: summary

  search:
    location: navbar
    type: textbox
    copy-button: true

  navbar:
    background: light
    pinned: true
    left:
      - href: index.qmd
        text: Home
      - href: research/index.qmd
        text: Research
      - href: publications/index.qmd
        text: Publications
      - href: cv/index.qmd
        text: CV
      - href: contact.qmd
        text: Contact

  page-footer:
    border: true
    left: "© 2026 Emmanuel Hackman"
    right: "Built with [Quarto](https://quarto.org) · [GitHub](https://github.com/Hachero98/personal-website)"

format:
  html:
    theme:
      light: [cosmo, assets/css/custom.scss]
      dark: [cosmo, assets/css/custom.scss, assets/css/dark.scss]
    css: assets/css/styles.css
    toc: true
    toc-location: right
    code-copy: true
    code-overflow: wrap
    smooth-scroll: true
    link-external-newwindow: true
    anchor-sections: true
    fig-align: center
    html-math-method: katex
    highlight-style: github
    code-block-bg: true
    code-block-border-left: true

bibliography: references.bib
link-citations: true
citations-hover: true
